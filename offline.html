<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Offline — BSCAN</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #060a14; color: #e8edf5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
		.wrap { text-align: center; max-width: 420px; }
		.icon { font-size: 48px; margin-bottom: 16px; }
		h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
		p { font-size: 14px; color: #8b9dc3; line-height: 1.6; margin-bottom: 24px; }
		button { padding: 12px 28px; border-radius: 10px; background: #f0a500; color: #060a14; font-weight: 700; font-size: 14px; border: none; cursor: pointer; font-family: inherit; }
		button:hover { opacity: 0.9; }
	</style>
</head>
<body>
	<div class="wrap">
		<div class="icon">📡</div>
		<h1>You're offline</h1>
		<p>BSCAN needs an internet connection to scan websites and load your dashboard. Check your connection and try again.</p>
		<button onclick="window.location.reload()">Try Again</button>
	</div>
</body>
</html>
