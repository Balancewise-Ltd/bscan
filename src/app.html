<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<!-- Security -->
		<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://api-bscan.balancewises.io https://www.google.com/s2/favicons data: blob:; connect-src 'self' https://api-bscan.balancewises.io https://fonts.googleapis.com https://fonts.gstatic.com https://fcm.googleapis.com https://firebaseinstallations.googleapis.com https://firebaselogging-pa.googleapis.com; frame-src 'none'; form-action 'self'; base-uri 'self'; object-src 'none';" />
		<meta http-equiv="X-Content-Type-Options" content="nosniff" />
		<meta name="referrer" content="strict-origin-when-cross-origin" />

		<!-- PWA -->
		<link rel="manifest" href="/manifest.json" />
		<meta name="theme-color" content="#f0a500" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<link rel="apple-touch-icon" href="/icons/icon-192.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-192.png" />

		<!-- Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
